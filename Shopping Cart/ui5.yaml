specVersion: "4.0"
metadata:
  name: sap.ui.demo.cart
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /browser
            url: https://api-sdm-di.cfapps.us10.hana.ondemand.com/browser
            destination: DMSDestination
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: sap.ui.demo.cart
        ui5Theme: sap_horizon
